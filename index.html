<!DOCTYPE html>
<html>
<head>
    <title>Homowork lesson#1</title>
    <meta name="robots" content="noindex">
    <meta charset="utf-8">
    <!--<meta name="viewport" content="width=device-width">-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" type="text/css" href="fonts/fonts.css">
    <link rel="stylesheet" type="text/css" href="main.css">
    <script
  src="https://code.jquery.com/jquery-3.3.1.min.js"
  integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
  crossorigin="anonymous"></script>
</head>
<body>
    <script id="size-s" type="text/x-handlebars-template">
        <div class="item item_size-s">
            <div class="item__title" style="color: <%= data.titleColor %>;">
                <div class="item__title__text">
                    <%= data.title %>
                </div>
            </div>
            <div class="item__image-wrapper">
                <!-- <img src="<%= image.l %>" class="item__image"> -->
                <img srcset="<%= image.s %> 320w, <%= image.m %> 640w, <%= image.l %> 1024w" src="<%= image.l %>" class="item__image">
            </div>
        </div>
    </script>
    <script id="size-s-text" type="text/x-handlebars-template">
        <div class="item item_size-s_text">
            <div class="item__title" style="color: <%= data.titleColor %>;">
                <%= data.title %>
            </div>
            <div class="item__description">
                <%= data.description %>
            </div>
            <div class="item__footer">
                <div class="item__author"><%= data.channelName %></div>
                <div class="item__buttons">
                    <div class="item__buttons__button item__buttons__button_actions"></div>
                    <div class="item__buttons__button item__buttons__button_heart"></div>
                </div>
            </div>
        </div>
    </script>
    <script id="size-m" type="text/x-handlebars-template">
        <div class="item item_size-m">
                <div class="item__title" style="color: <%= data.titleColor %>;">
                    <div class="item__title__text">
                        <%= data.title %>
                    </div>
                </div>
                <div class="item__image-wrapper">
                    <img srcset="<%= image.s %> 320w, <%= image.m %> 640w, <%= image.l %> 1024w" src="<%= image.l %>" class="item__image">
                </div>
                <div class="item__footer">
                    <div class="item__description">
                        <%= data.description %>
                    </div>
                    <div class="item__buttons">
                        <div class="item__buttons__button item__buttons__button_actions"></div>
                        <div class="item__buttons__button item__buttons__button_heart"></div>
                    </div>
                </div>
            </div>
    </script>
    <script id="size-l" type="text/x-handlebars-template">
        <div class="item item_size-l">
            <div class="item__title mobileVisible"><%= data.title %></div>
            <div class="item__image-wrapper">
                <img srcset="<%= image.s %> 320w, <%= image.m %> 640w, <%= image.l %> 1024w" src="<%= image.l %>" class="item__image">
            </div>
            <div class="item__text-col">
                <div class="item__title desktopVisible">
                    <%= data.title %>
                </div>
                <div class="item__description">
                    <div class="item__description__inner">
                        <div class="item__description__text"><%= data.description %></div>
                    </div>
                </div>
                <div class="item__buttons">
                    <div class="item__buttons__button item__buttons__button_actions"></div>
                    <div class="item__buttons__button item__buttons__button_heart"></div>
                </div>
            </div>
        </div>
    </script>
    <div class="container">
        <header class="header">
            <img src="img/zen_logo@2x.png">
        </header>
        <div id="main" class="main"></div>
    </div>
    <script type="text/javascript" src="main.js"></script>
</body>
</html>
